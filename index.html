<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitBoost - Koszyk</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 860px; margin: 2rem auto; padding: 1rem; }
    .product { border: 1px solid #ddd; border-radius: 8px; padding: 0.75rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
    #cart { margin-top: 1.5rem; }
    #cart-items { list-style: none; padding-left: 0; }
    #cart-items li { margin-bottom: 0.25rem; }
    #clear-cart-button { margin-top: 0.75rem; }
  </style>
</head>
<body>
  <h1>FitBoost - sklep demo</h1>

  <section id="products">
    <div class="product">
      <strong>Protein Bar</strong>
      <button type="button" data-product-name="Protein Bar" data-product-price="12.49">Dodaj do koszyka</button>
    </div>
    <div class="product">
      <strong>Pre-Workout</strong>
      <button type="button" data-product-name="Pre-Workout" data-product-price="89.90">Dodaj do koszyka</button>
    </div>
    <div class="product">
      <strong>BCAA</strong>
      <button type="button" data-product-name="BCAA" data-product-price="54.99">Dodaj do koszyka</button>
    </div>
  </section>

  <section id="cart">
    <h2>Twój koszyk (<span id="cart-count">0</span>)</h2>
    <ul id="cart-items"></ul>
    <p id="total">Suma: 0 zł</p>
    <button id="clear-cart-button" type="button" style="display:none;">Wyczyść koszyk</button>
  </section>

  <script src="cart.js"></script>
</body>
</html>
